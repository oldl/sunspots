<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sun-bright: #F5A623; --partial: #B8860B; --shade-blue: #7AADCC;
  --bg: #080D18; --bg-mid: #0D1525;
  --cream: #EFF4FF; --warm-mid: #7A96B8;
  --card-border: rgba(120,160,220,0.1);
}
html, body { background: var(--bg); color: var(--cream); font-family: 'DM Mono', monospace; overflow-x: hidden; }

/* ── HEADER ── */
.header { position:relative; background:var(--bg); padding:0.85rem 1.1rem 0; overflow:hidden; }

/* Solar circle bg */
.solar-bg {
  position:absolute;
  width:130vw; height:130vw;
  max-width:700px; max-height:700px;
  border-radius:50%;
  background: radial-gradient(circle at 45% 40%,
    #FFB347 0%, #F5A623 12%, #E8621A 35%,
    #A02000 60%, #580A00 80%, #1A0500 100%
  );
  top:-82%; left:50%; transform:translateX(-50%);
  z-index:0; opacity:0.85;
}

/* Glass overlay */
.solar-glass {
  position:absolute;
  bottom:0; left:0; right:0; height:65%;
  backdrop-filter:blur(16px) saturate(1.1);
  -webkit-backdrop-filter:blur(16px) saturate(1.1);
  background:linear-gradient(to bottom,
    rgba(13,9,4,0.0) 0%,
    rgba(13,9,4,0.6) 45%,
    rgba(13,9,4,0.95) 100%
  );
  z-index:1; pointer-events:none;
}

/* Arc SVG — absolute inside glass zone */
.arc-wrap {
  width:calc(100% + 2.2rem);
  margin:0.3rem -1.1rem 0;
  pointer-events:none;
}
.arc-svg { width:100%; height:auto; display:block; overflow:visible; }

/* All header text content above overlays */
.header-content { position:relative; z-index:3; }

.header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.25rem; }

/* SunSpots title */
.app-title {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:1.6rem;
  color:var(--cream);
  letter-spacing:-0.01em;
  line-height:1;
  opacity:0.95;
}
.app-sub {
  font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(239,244,255,0.55); margin-top:0.25rem; font-family:'DM Mono',monospace;
}

.time-block { text-align:right; }
.current-time {
  font-family:'Barlow Condensed', sans-serif; font-weight:800;
  font-size:2.4rem; color:var(--cream); letter-spacing:0.02em; line-height:1; opacity:0.88;
}
.current-date {
  font-size:0.44rem; color:var(--warm-mid); letter-spacing:0.1em;
  text-transform:uppercase; margin-top:0.1rem; opacity:0.45; font-family:'DM Mono',monospace;
}


/* ── TIMELINE CURSOR ── */
#timeline-cursor { 
  position:fixed;
  top:0; bottom:0;
  width:1px;
  background:linear-gradient(to bottom,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0) 22%,
    rgba(255,255,255,0.5) 32%,
    rgba(255,255,255,0.5) 88%,
    rgba(255,255,255,0) 100%
  );
  pointer-events:none;
  z-index:40;
  transform:translateX(-50%);
  transition:left 0.06s linear;
}

#cursor-chip { 
  position:fixed;
  font-family:'DM Mono',monospace;
  font-size:0.42rem;
  letter-spacing:0.06em;
  color:rgba(255,255,255,0.9);
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.28);
  padding:0.12rem 0.35rem;
  pointer-events:none;
  z-index:41;
  transform:translateX(-50%);
  transition:left 0.06s linear;
  white-space:nowrap;
  backdrop-filter:blur(4px);
}

/* ── SLIDER ── */
.slider-area { padding:0.35rem 0 0.1rem; }
.slider-meta { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.42rem; }
.time-label { font-size:0.44rem; color:var(--warm-mid); opacity:0.5; letter-spacing:0.12em; text-transform:uppercase; }
.selected-time { font-family:'Barlow Condensed', sans-serif; font-weight:800; font-size:2.5rem; color:var(--sun-bright); letter-spacing:0.02em; line-height:1; }
.sun-status { font-family:'DM Mono', monospace; font-size:0.74rem; color:var(--warm-mid); text-align:right; }

input[type=range] { -webkit-appearance:none; width:100%; height:2px; background:rgba(245,166,35,0.12); outline:none; cursor:pointer; display:block; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; background:var(--cream); border:2px solid var(--bg); border-radius:50%; cursor:pointer; box-shadow:0 0 8px rgba(245,166,35,0.55); }
.time-ticks { display:flex; justify-content:space-between; font-size:0.44rem; color:rgba(120,160,220,0.35); margin-top:0.32rem; }

/* ── WEATHER + GEO ── */
.weather-geo { display:flex; align-items:center; justify-content:space-between; padding:0.52rem 0 0.65rem; margin-top:0.48rem; }
.weather-block { display:flex; align-items:center; gap:0.4rem; }
.weather-icon { font-size:1rem; }
.weather-text { font-family:'DM Mono', monospace; font-size:0.72rem; color:var(--warm-mid); }
.geo-btn { font-size:0.44rem; color:var(--shade-blue); border:1px solid rgba(90,122,138,0.3); padding:0.17rem 0.44rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; background:none; font-family:'DM Mono',monospace; }
.geo-btn:hover { border-color:var(--shade-blue); }
.geo-btn.located { color:var(--sun-bright); border-color:rgba(245,166,35,0.4); }

/* ── TABS ── */
.commune-tabs { display:flex; overflow-x:auto; scrollbar-width:none; background:var(--bg-mid); border-top:1px solid var(--card-border); border-bottom:1px solid var(--card-border); position:sticky; top:0; z-index:50; }
.commune-tabs::-webkit-scrollbar { display:none; }
.commune-tab { font-family:'Barlow Condensed', sans-serif; font-weight:700; font-size:0.82rem; letter-spacing:0.1em; color:rgba(154,122,90,0.36); padding:0.56rem 0.88rem 0.5rem; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; transition:all 0.18s; flex-shrink:0; position:relative; top:1px; }
.commune-tab:hover { color:var(--warm-mid); }
.commune-tab.active { color:var(--sun-bright); border-bottom-color:var(--sun-bright); }
.commune-tab.geo-tab { color:rgba(90,122,138,0.42); border-left:1px solid var(--card-border); margin-left:auto; }
.commune-tab.geo-tab.active { color:var(--shade-blue); border-bottom-color:var(--shade-blue); }

/* ── COUNT ── */
.sun-count { padding:0.46rem 1.1rem; font-size:0.5rem; color:var(--warm-mid); opacity:0.5; letter-spacing:0.1em; text-transform:uppercase; min-height:1.65rem; display:flex; align-items:center; border-bottom:1px solid var(--card-border); background:var(--bg); }
.sun-count span { color:var(--sun-bright); opacity:1; font-weight:500; }

/* ── CARDS ── */
.cafe-list { padding:0 0 4rem; background:var(--bg); }
.cafe-card { padding:0.82rem 1.1rem; border-bottom:1px solid var(--card-border); display:grid; grid-template-columns:1fr auto; gap:0.3rem 0.82rem; cursor:pointer; transition:background 0.15s; position:relative; }
.cafe-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.cafe-card.s::before { background:var(--sun-bright); }
.cafe-card.p::before { background:var(--partial); }
.cafe-card.n::before { background:rgba(90,122,138,0.1); }
.cafe-card.s { background:rgba(245,166,35,0.04); }
.cafe-card:active { background:rgba(245,166,35,0.08); }

.cafe-name { font-family:'Syne', sans-serif; font-weight:700; font-size:0.95rem; color:var(--cream); line-height:1.2; }
.cafe-meta-row { display:flex; align-items:center; gap:0.38rem; margin-top:0.05rem; flex-wrap:wrap; }
.cafe-dist { font-size:0.46rem; color:var(--warm-mid); opacity:0.38; }
.cafe-dist::before { content:'·'; margin-right:0.3rem; }

.sun-badge { font-family:'Barlow Condensed', sans-serif; font-weight:800; font-size:0.65rem; letter-spacing:0.08em; padding:0.12rem 0.42rem; align-self:start; flex-shrink:0; white-space:nowrap; }
.sun-badge.s { background:linear-gradient(135deg,#FFD166 0%,#F5A623 55%,#E8840A 100%); color:#0A0600; border:none; box-shadow:0 0 10px rgba(245,166,35,0.3); }
.sun-badge.p { background:transparent; border:1px solid rgba(184,134,11,0.5); color:#B8960A; }
.sun-badge.n { background:transparent; border:1px solid rgba(120,160,220,0.18); color:rgba(120,160,220,0.38); }

.day-bar-mini { grid-column:1/-1; display:flex; height:3px; gap:1px; border-radius:1px; overflow:hidden; }
.ds { flex:1; }
.ds.s { background:var(--sun-bright); opacity:0.76; }
.ds.p { background:var(--partial); opacity:0.56; }
.ds.n { background:rgba(255,255,255,0.053); }
.ds.active { outline:2px solid rgba(255,255,255,0.52); outline-offset:1px; position:relative; z-index:1; }

.card-expanded { grid-column:1/-1; padding-top:0.5rem; border-top:1px solid var(--card-border); margin-top:0.13rem; display:none; }
.card-expanded.open { display:block; }
.expand-ticks { display:flex; justify-content:space-between; font-size:0.44rem; color:rgba(154,122,90,0.27); margin-bottom:0.27rem; }
.sun-window { font-size:0.6rem; color:var(--warm-mid); margin-top:0.27rem; }
.sun-window strong { color:var(--sun-bright); }
.sun-window.theoretical { color: var(--warm-mid); opacity: 0.7; }
.sun-window.theoretical strong { color: var(--warm-mid); }
.sun-window-note { font-size: 0.46rem; opacity: 0.55; display: block; margin-top: 0.15rem; letter-spacing: 0.04em; }

.azimuth-tag { font-size:0.44rem; color:rgba(154,122,90,0.22); margin-top:0.17rem; letter-spacing:0.05em; }

.cafe-name-row
